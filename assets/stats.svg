    .title    { font: 500 13px "Segoe UI", sans-serif; fill: #58a6ff; }
    .label    { font: 400 11px "Segoe UI", sans-serif; fill: #8b949e; }
    .value    { font: 600 11px "Segoe UI", sans-serif; fill: #e6edf3; }
    .icon     { fill: none; stroke: #8b949e; stroke-width: 1.4; }
    .num-big  { font: 700 24px "Segoe UI", sans-serif; fill: #58a6ff; }
    .num-rank { font: 700 28px "Segoe UI", sans-serif; fill: #58a6ff; }
    .streak-l { font: 400 11px "Segoe UI", sans-serif; fill: #8b949e; }
    .streak-b { font: 400 11px "Segoe UI", sans-serif; fill: #58a6ff; }
    .date     { font: 400  9px "Segoe UI", sans-serif; fill: #8b949e; }
    .sub      { font: 400  9px "Segoe UI", sans-serif; fill: #8b949e; }
  </style>
</defs>

<!-- ── CARD: Stats ── -->
